name: Release TypeScript SDK

on:
    workflow_dispatch:
    workflow_call:

permissions:
    id-token: write # Required for OIDC trusted publishing
    contents: read

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Set up pnpm
              uses: pnpm/action-setup@v4

            - name: Set up node
              uses: actions/setup-node@v4
              with:
                  node-version: '22'

            - name: Install dependencies and build
              run: pnpm install && pnpm build

            - name: Publish to npm via npm 11 (OIDC trusted publishing)
              run: pnpm dlx npm@11 publish --access public --provenance --registry https://registry.npmjs.org

            - name: Upload npm logs on failure
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: npm-debug-logs
                  path: /home/runner/.npm/_logs/
                  retention-days: 5
